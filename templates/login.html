<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OMR Lens — 접속</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='9' fill='%230F4C75'/%3E%3Ccircle cx='20' cy='20' r='11' fill='none' stroke='%23BBE1FA' stroke-width='3.2'/%3E%3Ccircle cx='20' cy='20' r='4.4' fill='%23BBE1FA'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#F8F9F6; --ink:#1B262C; --ink-soft:#4A5A66;
    --primary:#0F4C75; --primary-2:#3282B8; --sky:#BBE1FA; --sky-soft:#E8F3FC;
    --danger:#CB3534; --line:#E3E8EC;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,
      "Segoe UI","Malgun Gothic","맑은 고딕",sans-serif;
    background:linear-gradient(135deg,var(--primary) 0%,#1B262C 100%);
    min-height:100vh;display:grid;place-items:center;color:var(--ink);
  }
  .card{
    background:#fff;border-radius:18px;padding:38px 40px;width:min(400px,92vw);
    box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center;
  }
  .mark{
    width:56px;height:56px;border-radius:14px;background:var(--sky);margin:0 auto 16px;
    display:grid;place-items:center;font-weight:800;font-size:17px;color:var(--primary);
  }
  h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
  p{font-size:13px;color:var(--ink-soft);margin:8px 0 22px;line-height:1.6}
  input{
    width:100%;padding:14px;border:1.5px solid var(--line);border-radius:11px;
    font-size:18px;font-family:inherit;text-align:center;letter-spacing:6px;font-weight:700;
  }
  input:focus{outline:none;border-color:var(--primary-2);box-shadow:0 0 0 3px var(--sky-soft)}
  button{
    width:100%;margin-top:12px;padding:14px;border:none;border-radius:11px;cursor:pointer;
    background:var(--primary);color:#fff;font-size:15.5px;font-weight:800;font-family:inherit;
  }
  button:hover{background:#0D4368}
  .err{color:var(--danger);font-size:13px;font-weight:700;margin-top:12px;min-height:18px}
</style>
</head>
<body>
  <form class="card" method="post">
    <div class="mark">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OMR Lens">
        <circle cx="24" cy="24" r="13" fill="none" stroke="#0F4C75" stroke-width="4"/>
        <circle cx="24" cy="24" r="5.6" fill="#0F4C75"/>
        <path d="M34 34 L40 40" stroke="#0F4C75" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>OMR Lens</h1>
    <p>모의고사 OMR 스캔·채점 · 공유 접속입니다.<br>담당 선생님께 받은 <b>접속 코드</b>를 입력하세요.</p>
    <input type="password" name="code" inputmode="numeric" autocomplete="off" autofocus placeholder="······">
    <button type="submit">입장</button>
    <div class="err">{{ error }}</div>
  </form>
</body>
</html>
