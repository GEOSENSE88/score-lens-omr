# OMR Lens nginx 서버 블록 — 분석기와 별개의 독립 서브도메인.
# /etc/nginx/sites-available/omr-lens 로 저장 후 sites-enabled 에 심링크.
# ⚠️ 분석기(widget.26sannam3.site / sannam_score)의 기존 설정은 건드리지 않는다.
#
# 사전: DNS 에 omr.26sannam3.site → 서버 IP (Cloudflare), TLS 인증서 발급.

server {
    listen 80;
    server_name omr.26sannam3.site;
    # certbot 이 여기에 443/redirect 를 추가한다 (sudo certbot --nginx -d omr.26sannam3.site)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name omr.26sannam3.site;

    # ssl_certificate ...  (certbot 자동 삽입)

    client_max_body_size 320m;         # 스캔 PDF 업로드 허용 크기
    proxy_read_timeout 600s;           # 대량 채점 대기

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
